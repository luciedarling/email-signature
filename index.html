<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infludeo 이메일 서명 생성기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
  header { background: #fff; border-bottom: 1px solid #e8e8e6; padding: 16px 32px; display: flex; align-items: center; gap: 12px; }
  header img { height: 22px; }
  header span { font-size: 13px; color: #888; margin-left: 4px; }
  main { max-width: 900px; margin: 32px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .panel { background: #fff; border: 1px solid #e8e8e6; border-radius: 12px; padding: 24px; }
  .panel h2 { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 18px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #777; margin-bottom: 4px; }
  .field input { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid #e0e0de; border-radius: 7px; background: #fafafa; color: #1a1a1a; outline: none; transition: border-color .15s; }
  .field input:focus { border-color: #FF4F00; background: #fff; }
  .preview-wrap { background: #fff; border-radius: 8px; padding: 20px; min-height: 140px; overflow-x: auto; }
.notice { font-size: 11px; color: #aaa; margin-top: 8px; line-height: 1.7; }
  .notice strong { color: #777; }
  @media (max-width: 620px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <img id="header-logo" alt="infludeo">
  <span>이메일 서명 생성기</span>
</header>

<main>
  <div class="panel">
    <h2>정보 입력</h2>
    <div class="field"><label>이름 (한글)</label><input id="name_ko" value="서지원" oninput="update()"></div>
    <div class="field"><label>이름 (영문)</label><input id="name_en" value="Jiwon Seo" oninput="update()"></div>
    <div class="field"><label>부서</label><input id="dept" value="경영관리팀" oninput="update()"></div>
    <div class="field"><label>직함</label><input id="title" value="인사/총무 매니저" oninput="update()"></div>
    <div class="field"><label>전화번호</label><input id="phone" value="+82-10-4759-0125" oninput="update()"></div>
    <div class="field"><label>이메일</label><input id="email" value="lucie@infludeo.com" oninput="update()"></div>
  </div>

  <div class="panel">
    <h2>미리보기</h2>
    <div id="sig-box" style="border:1.5px dashed #FF4F00;border-radius:8px;padding:16px 18px;background:#fff;display:inline-block;min-width:100%;box-sizing:border-box;">
      <div id="sig-render"></div>
    </div>
    <p class="notice" style="margin-top:8px;">
      <strong>Gmail 적용 방법</strong><br>
      위 테두리 안 서명을 마우스로 드래그하여 전체 선택 → Ctrl+C (Mac: Cmd+C)<br>
      Gmail 설정 → 서명 → 편집창 클릭 후 Ctrl+V (Mac: Cmd+V) 로 붙여넣기
    </p>
  </div>
</main>

</div>

  return `<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,sans-serif;font-size:12px;color:#333;border-collapse:collapse;">
  <tr>
    <td style="vertical-align:top;padding-right:24px;padding-bottom:8px;width:180px;min-width:180px;max-width:180px;border-right:1.5px solid #e0e0e0;">
      <div style="font-size:15px;font-weight:700;color:#111;margin-bottom:3px;white-space:nowrap;">${nk}&nbsp;&nbsp;${ne}</div>
      <div style="font-size:11.5px;color:#666;margin-bottom:20px;white-space:nowrap;">${dept}, ${title}</div>
      <img src="${LOGO_B64}" alt="infludeo" style="height:22px;display:block;">
    </td>
    <td style="vertical-align:top;padding-left:24px;padding-bottom:8px;width:360px;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="font-size:11px;font-weight:700;color:#FF4F00;padding-right:8px;padding-bottom:3px;white-space:nowrap;">Phone</td>
          <td style="font-size:12px;color:#333;padding-bottom:3px;">${phone}</td>
        </tr>
        <tr>
          <td style="font-size:11px;font-weight:700;color:#FF4F00;padding-right:8px;padding-bottom:12px;white-space:nowrap;">Email</td>
          <td style="font-size:12px;padding-bottom:12px;"><a href="mailto:${email}" style="color:#333;text-decoration:none;">${email}</a></td>
        </tr>
        <tr>
          <td colspan="2" style="font-size:11px;color:#555;line-height:1.75;padding-bottom:4px;width:360px;">
            <div style="white-space:nowrap;">서울특별시 영등포구 영종로 15, A동 20층 2001호</div>
            <div style="white-space:nowrap;">2001, 20F, Office A Section, 15 Yeongjung-ro,</div><div style="white-space:nowrap;">Yeongdeungpo-gu, Seoul, 07305, South Korea</div>
          </td>
        </tr>
        <tr>
          <td colspan="2" style="font-size:11px;color:#aaa;">(주)인플루디오 &nbsp;|&nbsp; <a href="https://phocamarket.com" style="color:#aaa;text-decoration:none;">phocamarket.com</a></td>
        </tr>
      </table>
    </td>
  </tr>
</table>`;
}

function v(id) { return document.getElementById(id).value; }

function update() {
  const html = buildSigHTML(v('name_ko'), v('name_en'), v('dept'), v('title'), v('phone'), v('email'));
  document.getElementById('sig-render').innerHTML = html;
}


update();
</script>
